# r cmd check workflow of the mlr3 ecosystem v0.2.0
# https://github.com/mlr-org/actions
on:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron:  '0 4 * * 1'


name: r-cmd-check

jobs:
  r-cmd-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,   r: 'devel'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}

      - name: Set test environment variables (unix)
        if: runner.os != 'Windows'
        run: |
          echo "TORCH_TEST=1" >> $GITHUB_ENV
          echo "INCLUDE_IGNORED=1" >> $GITHUB_ENV
          # The dataset hosts (e.g. cs.toronto.edu for CIFAR) are frequently throttled to a
          # few kB/s. R's default download timeout of 60s -- and torchvision's floor of 600s --
          # is far too short for a ~170 MB archive at that rate, which is what turns a slow
          # host into a red build. Give a cold cache enough room to succeed once.
          echo "R_DEFAULT_INTERNET_TIMEOUT=3600" >> $GITHUB_ENV

      - name: Set test environment variables (windows)
        if: runner.os == 'Windows'
        run: |
          echo "TORCH_TEST=1" >> $env:GITHUB_ENV
          echo "INCLUDE_IGNORED=1" >> $env:GITHUB_ENV
          echo "R_DEFAULT_INTERNET_TIMEOUT=3600" >> $env:GITHUB_ENV

      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install torch
        run: |
          Rscript -e 'torch::install_torch()'

      - name: Install further packages
        run: |
          Rscript -e 'install.packages("rappdirs")'

      - name: Get torchvision package version (Linux/macOS)
        if: runner.os != 'Windows'
        id: get_package_version_unix
        run: |
          echo "TORCHVISION_PACKAGE_VERSION=$(Rscript -e 'cat(as.character(packageVersion("torchvision")))')" >> $GITHUB_ENV

      - name: Get torchvision package version (Windows)
        if: runner.os == 'Windows'
        id: get_package_version_windows
        run: |
          $version = Rscript -e 'cat(as.character(packageVersion("torchvision")))' 
          echo "TORCHVISION_PACKAGE_VERSION=$version" >> $env:GITHUB_ENV

      - name: Get torch cache path (Linux/macOS)
        if: runner.os != 'Windows'
        id: get_cache_path_unix
        run: |
          echo "TORCH_CACHE_PATH=$(Rscript -e 'cat(rappdirs::user_cache_dir("torch"))')" >> $GITHUB_ENV
          echo "MLR3TORCH_CACHE_PATH=$(Rscript -e 'cat(tools::R_user_dir("mlr3torch", "cache"))')" >> $GITHUB_ENV

      - name: Get torch cache path (Windows)
        if: runner.os == 'Windows'
        id: get_cache_path_windows
        run: |
          $cachePath = Rscript -e 'cat(rappdirs::user_cache_dir("torch"))'
          echo "TORCH_CACHE_PATH=$cachePath" >> $env:GITHUB_ENV
          $mlr3torchCachePath = Rscript -e 'cat(tools::R_user_dir("mlr3torch", "cache"))'
          echo "MLR3TORCH_CACHE_PATH=$mlr3torchCachePath" >> $env:GITHUB_ENV

      # The dataset archives (CIFAR, MNIST, tiny-imagenet, ...) are downloaded from external
      # hosts that are regularly slow. Restore and save are deliberately split:
      # `actions/cache` only saves in a post step guarded by `post-if: success()`, so a job
      # that failed for any reason never repopulates the cache. That is self-perpetuating:
      # once the entry is evicted (GitHub drops entries not accessed for 7 days, and this
      # workflow only runs weekly), the job can never get back to green on its own.
      # `actions/cache/save` with `if: always()` persists whatever was downloaded even when
      # the check failed, so one slow-but-successful download warms the cache permanently.
      - name: Restore Torchvision Downloads
        id: torch_cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.TORCH_CACHE_PATH }}
            ${{ env.MLR3TORCH_CACHE_PATH }}
          key: ${{ runner.os }}-r-${{ env.TORCHVISION_PACKAGE_VERSION }}
          # Fall back to an entry from a previous torchvision version: the cached dataset
          # archives do not depend on it, so a version bump should not cold-start every runner.
          restore-keys: |
            ${{ runner.os }}-r-

      - uses: r-lib/actions/check-r-package@v2

      - name: Save Torchvision Downloads
        uses: actions/cache/save@v4
        if: always() && steps.torch_cache.outputs.cache-hit != 'true'
        with:
          path: |
            ${{ env.TORCH_CACHE_PATH }}
            ${{ env.MLR3TORCH_CACHE_PATH }}
          key: ${{ runner.os }}-r-${{ env.TORCHVISION_PACKAGE_VERSION }}

      - uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        with:
          limit-access-to-actor: true
